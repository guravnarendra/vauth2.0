<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - VAUTH</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#7C3AED',
                        secondary: '#4F46E5',
                        accent: '#F59E0B',
                        dark: '#1F2937',
                        light: '#F9FAFB',
                        success: '#10B981',
                        warning: '#F59E0B',
                        error: '#EF4444',
                        info: '#3B82F6'
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif
        }

        .gradient-text {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .card-hover {
            transition: .3s;
            border: 1px solid #e5e7eb
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(124, 58, 237, .15);
            border-color: #7c3aed
        }

        .form-input {
            transition: .3s;
            border: 1px solid #e5e7eb
        }

        .form-input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, .25);
            border-color: #7c3aed
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: .3s;
            border: none;
            cursor: pointer
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, .3)
        }

        .btn-secondary {
            background: #f8fafc;
            color: #374151;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: .3s;
            border: 1px solid #e5e7eb;
            cursor: pointer
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .1)
        }

        .loading-pulse {
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .7
            }
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px
        }

        ::-webkit-scrollbar-thumb {
            background: #c7d2fe;
            border-radius: 10px
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #7c3aed
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center">
                        <div
                            class="w-8 h-8 bg-gradient-to-r from-primary to-secondary rounded-lg flex items-center justify-center mr-3">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <h1 class="text-xl font-bold gradient-text">VAUTH</h1>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-600 hover:text-primary font-medium">Home</a>
                    <a href="/admin/login" class="btn-secondary">Admin Login</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center py-8 px-4 login-container">
        <div class="max-w-md w-full space-y-8">

            <div class="text-center">
                <div
                    class="mx-auto h-16 w-16 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center shadow-lg">
                    <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2 class="mt-6 text-3xl font-bold text-gray-900">User Login</h2>
                <p class="mt-2 text-gray-600">Enter your credentials to access your account</p>
            </div>

            <div class="login-card bg-white py-8 px-6 shadow-xl rounded-2xl card-hover">

                <form id="loginForm" class="space-y-6">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                        <input id="username" type="text" required
                            class="form-input w-full px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="Enter your username">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input id="password" type="password" required
                            class="form-input w-full px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="Enter your password">
                    </div>

                    <div id="errorMessage"
                        class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl">
                        <div class="flex items-center">
                            <svg class="h-5 w-5 text-red-400 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                                    clip-rule="evenodd" />
                            </svg>
                            <span id="errorText" class="text-sm font-medium"></span>
                        </div>
                    </div>

                    <button id="loginButton" type="submit" class="btn-primary w-full flex justify-center relative">
                        <span id="loginButtonText">Sign In</span>
                    </button>

                </form>

                <div class="mt-6 text-center text-sm text-gray-600">
                    Need admin access?
                    <a href="/admin/login" class="font-medium text-primary">Admin Login</a>
                </div>

            </div>

            <div class="mt-6">
                <div
                    class="relative overflow-hidden rounded-2xl border border-indigo-100 bg-gradient-to-br from-indigo-50 via-white to-purple-50 p-6 shadow-lg">
                    <div class="bg-white border rounded-xl px-5 py-4">

                        <div class="flex items-center gap-3">

                            <!-- monitor icon -->
                            <svg class="w-8 h-8 text-gray-800" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <rect x="2" y="3" width="20" height="14" rx="2" />
                                <line x1="8" y1="21" x2="16" y2="21" />
                                <line x1="12" y1="17" x2="12" y2="21" />
                            </svg>

                            <span class="text-xl font-extrabold tracking-wide text-gray-900">
                                V-Gate🔐
                            </span>

                        </div>

                        <p class="mt-3 text-sm text-gray-600">
                            Two-Factor Authentication is required.
                            After login, verify using your VAUTH device or PC-Agent token.
                        </p>

                        <a href="/downloads/pc.exe" download
                            class="inline-block mt-4 text-sm font-semibold text-black underline underline-offset-4">
                            Download V-Gate
                        </a>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="alertModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 z-50">
        <div class="relative top-20 mx-auto p-5 w-96 bg-white rounded-2xl">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100">
                    <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                </div>
                <h3 class="mt-2 text-lg font-medium">Security Alert</h3>
                <p id="alertMessage" class="mt-2 text-sm text-gray-500"></p>
                <button id="closeAlert" class="btn-primary w-full mt-4">Close</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault()

            const username = usernameInput.value
            const password = passwordInput.value

            const errorDiv = document.getElementById('errorMessage')
            const errorText = document.getElementById('errorText')
            const loginButton = document.getElementById('loginButton')
            const loginButtonText = document.getElementById('loginButtonText')

            errorDiv.classList.add('hidden')

            loginButton.disabled = true
            loginButtonText.textContent = 'Signing In...'
            loginButton.classList.add('loading-pulse')

            try {
                const res = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                    body: JSON.stringify({ username, password })
                })

                const data = await res.json()

                if (data.success) {
                    showAlert('Login successful. Redirecting to 2FA...', 'success')
                    sessionStorage.setItem('vauth_device_id', data.vauth_device_ID)
                    sessionStorage.setItem('username', username)
                    setTimeout(() => location.href = '/2fa', 1200)
                } else {
                    errorText.textContent = data.message || 'Login failed'
                    errorDiv.classList.remove('hidden')
                }

            } catch (e) {
                errorText.textContent = 'Network error'
                errorDiv.classList.remove('hidden')
            }

            loginButton.disabled = false
            loginButtonText.textContent = 'Sign In'
            loginButton.classList.remove('loading-pulse')
        })

        const usernameInput = document.getElementById('username')
        const passwordInput = document.getElementById('password')

        async function showAlert(msg, type) {
            const modal = document.getElementById('alertModal')
            document.getElementById('alertMessage').textContent = msg
            modal.classList.remove('hidden')
        }

        document.getElementById('closeAlert').onclick = () => {
            document.getElementById('alertModal').classList.add('hidden')
        }

        window.addEventListener('load', async () => {
            try {
                const r = await fetch('/api/user/session-status', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                const d = await r.json()
                if (d.success && d.authenticated) location.href = '/dashboard'
            } catch { }
        })
    </script>

</body>

</html>
